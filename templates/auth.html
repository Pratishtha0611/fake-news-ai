<!DOCTYPE html>
<html>
<head>

    <title>Authentication</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

    <div class="auth-box">

        <h1>Fake News AI</h1>

        <div class="toggle-buttons">

            <button onclick="showLogin()">
                Login
            </button>

            <button onclick="showSignup()">
                Signup
            </button>

        </div>

        <!-- LOGIN -->

        <form id="loginForm"
        action="/login"
        method="POST">

            <input type="email"
            name="email"
            placeholder="Email"
            required>

            <input type="password"
            name="password"
            placeholder="Password"
            required>

            <button type="submit">
                Login
            </button>

        </form>

        <!-- SIGNUP -->

        <form id="signupForm"
        action="/signup"
        method="POST"

        style="display:none;">

            <input type="text"
            name="name"
            placeholder="Full Name"
            required>

            <input type="email"
            name="email"
            placeholder="Email"
            required>

            <input type="password"
            name="password"
            placeholder="Password"
            required>

            <button type="submit">
                Signup
            </button>

        </form>

    </div>

</div>

<script>

function showSignup(){

    document.getElementById("signupForm").style.display="block";

    document.getElementById("loginForm").style.display="none";
}

function showLogin(){

    document.getElementById("loginForm").style.display="block";

    document.getElementById("signupForm").style.display="none";
}

</script>

</body>
</html>
