<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Fake News Detection AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="logo">FakeNews<span>AI</span></a>
    </nav>

    <div class="container" style="display: flex; align-items: center; justify-content: center;">
        <div class="card auth-box">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <h2>Create New Password</h2>
            <p class="subtitle">Enter a new secure password for {{ email }}</p>

            <form action="/reset_password/{{ email }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" name="password" required placeholder="Enter new password">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required placeholder="Confirm new password">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Update Password</button>
            </form>
            
        </div>
    </div>

</body>
</html>
