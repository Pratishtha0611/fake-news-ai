<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Fake News Detection AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="logo">FakeNews<span>AI</span></a>
        <div class="nav-links">
            <a href="/login" class="btn-nav" style="background: transparent; border: 1px solid var(--accent);">Login</a>
        </div>
    </nav>

    <div class="container" style="display: flex; align-items: center; justify-content: center;">
        <div class="card auth-box">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <h2>Forgot Password</h2>
            <p class="subtitle">Enter your email to reset your password</p>

            <form action="/forgot_password" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="you@example.com">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Find Account</button>
            </form>
            
            <p class="text-center" style="margin-top: 25px; color: var(--text-muted); font-size: 14px;">
                Remembered it? <a href="/login">Back to login</a>
            </p>
        </div>
    </div>

</body>
</html>
